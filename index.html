<form action="https://formspree.io/f/xbdbgdly" method="POST">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required autocomplete="name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="service">Required Modality</label>
                    <select id="service" name="service" required>
                        <option value="">-- Please Select --</option>
                        <option value="psychodynamic-individual">Psychodynamic Individual Therapy</option>
                        <option value="psychodynamic-couples">Psychodynamic Couples Therapy</option>
                        <option value="cbt-psychiatry">CBT or Psychiatric Consultation</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="source">Source Inquiry: How did you find our clinic?</label>
                    <select id="source" name="source" required>
                        <option value="">-- Please Select --</option>
                        <option value="search">Search Engine (Google/Bing)</option>
                        <option value="directory">Professional Directory (BACP/UKCP/BABCP)</option>
                        <option value="referral">Clinical Professional Referral</option>
                        <option value="blog">Our Clinical Blog</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Brief Outline of Your Enquiry</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>

                <button type="submit" class="cta-button" style="border: none; cursor: pointer;">Submit Secure Enquiry</button>
            </form>
